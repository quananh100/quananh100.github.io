<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
  <title>Flappy Birch</title>
  <style>
    html, body {
      margin: 0; padding: 0; overflow: hidden;
      width: 100%; height: 100%;
      background: #70c5ce;
      font-family: sans-serif;
    }
    #gameCanvas {
      display: block;
      width: 100vw; height: 100vh;
      background: #70c5ce;
    }
    #commandInput {
      position: fixed;
      bottom: 10px; left: 50%;
      transform: translateX(-50%);
      width: 80vw; max-width: 400px;
      font-size: 18px; padding: 10px;
      border-radius: 6px; border: none;
      outline: none;
      background: rgba(255,255,255,0.9);
      z-index: 10;
    }
    #bannedOverlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      color: white;
      font-size: 30px;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 999;
    }
    #banCountdown {
      font-size: 48px;
      margin-top: 20px;
    }
    #resetButton {
      margin-top: 20px;
      padding: 10px 30px;
      font-size: 20px;
      background: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: none;
    }
  </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>
<input id="commandInput" placeholder="Enter command..." />
<div id="bannedOverlay">
  <div>You have been banned!</div>
  <div id="banCountdown">01:00</div>
</div>
<button id="resetButton">Reset</button>

<script>
(() => {
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const input = document.getElementById('commandInput');
  const overlay = document.getElementById('bannedOverlay');
  const countdown = document.getElementById('banCountdown');
  const resetBtn = document.getElementById('resetButton');

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  let bird = { x: 50, y: 150, w: 30, h: 24, v: 0, g: 0.6, jump: -12 };
  let pipes = [];
  let score = 0;
  let frame = 0;
  let gameOver = false;

  let ghost = false;
  let speed = 1;
  let antiban = localStorage.getItem('antiban') === 'true';
  let bannedUntil = parseInt(localStorage.getItem('bannedUntil') || 0);
  let inputActive = false;

  function showBan() {
    overlay.style.display = 'flex';
    resetBtn.style.display = 'block';
  }

  function hideBan() {
    overlay.style.display = 'none';
    resetBtn.style.display = 'none';
  }

  function updateCountdown() {
    let now = Date.now();
    let diff = bannedUntil - now;
    if (diff <= 0) {
      clearInterval(timer);
      bannedUntil = 0;
      localStorage.removeItem('bannedUntil');
      hideBan();
      resetGame();
      gameLoop();
    } else {
      let m = Math.floor(diff / 60000);
      let s = Math.floor((diff % 60000) / 1000);
      countdown.textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }
  }

  let timer;
  if (bannedUntil > Date.now()) {
    showBan();
    updateCountdown();
    timer = setInterval(updateCountdown, 1000);
    return;
  }

  function banPlayer() {
    if (antiban) return;
    bannedUntil = Date.now() + 60000;
    localStorage.setItem('bannedUntil', bannedUntil);
    showBan();
    updateCountdown();
    timer = setInterval(updateCountdown, 1000);
    gameOver = true;
  }

  function resetGame() {
    bird.y = 150;
    bird.v = 0;
    pipes = [];
    frame = 0;
    score = 0;
    gameOver = false;
    hideBan();
  }

  function addPipe() {
    const gap = 120;
    const top = Math.random() * (canvas.height / 2);
    pipes.push({ x: canvas.width, top: top, bottom: top + gap, passed: false });
  }

  function drawBird() {
    ctx.fillStyle = ghost ? 'rgba(255,255,255,0.5)' : '#ff0';
    ctx.beginPath();
    ctx.ellipse(bird.x, bird.y, bird.w/2, bird.h/2, 0, 0, 2 * Math.PI);
    ctx.fill();
  }

  function drawPipes() {
    ctx.fillStyle = '#0a0';
    for (let p of pipes) {
      ctx.fillRect(p.x, 0, 40, p.top);
      ctx.fillRect(p.x, p.bottom, 40, canvas.height - p.bottom);
    }
  }

  function drawScore() {
    ctx.fillStyle = '#fff';
    ctx.font = '24px sans-serif';
    ctx.fillText("Score: " + score, 10, 30);
  }

  function jump() {
    if (gameOver || inputActive) return;
    bird.v = bird.jump * speed;
  }

  canvas.addEventListener('click', jump);
  window.addEventListener('keydown', e => {
    if (e.code === 'Space') jump();
  });

  input.addEventListener('focus', () => inputActive = true);
  input.addEventListener('blur', () => inputActive = false);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const cmd = input.value.trim().toLowerCase();
      input.value = '';
      input.blur();
      inputActive = false;

      if (!cmd.startsWith('/')) return;

      if (cmd === '/ghost on') {
        ghost = true;
        alert('Ghost mode ON');
      } else if (cmd === '/ghost off') {
        ghost = false;
        alert('Ghost mode OFF');
      } else if (cmd.startsWith('/speed ')) {
        const n = parseInt(cmd.split(' ')[1]);
        if (!isNaN(n) && n >= 1 && n <= 3) {
          speed = n;
          alert(`Speed set to ${speed}`);
        } else {
          alert('Speed chỉ được phép từ 1 đến 3');
        }
      }

      if (!antiban && (ghost || speed > 1)) {
        banPlayer();
      }
    }
  });

  resetBtn.addEventListener('click', () => {
    if (bannedUntil <= Date.now()) {
      resetGame();
      gameLoop();
    }
  });

  function gameLoop() {
    if (gameOver || inputActive) {
      requestAnimationFrame(gameLoop);
      return;
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    frame++;
    if (frame % 90 === 0) addPipe();

    bird.v += bird.g * speed;
    bird.y += bird.v;

    for (let pipe of pipes) {
      pipe.x -= 3 * speed;
    }

    pipes = pipes.filter(p => p.x + 40 > 0);

    if (!ghost) {
      for (let p of pipes) {
        if (
          bird.x + bird.w/2 > p.x &&
          bird.x - bird.w/2 < p.x + 40 &&
          (bird.y - bird.h/2 < p.top || bird.y + bird.h/2 > p.bottom)
        ) {
          banPlayer();
          return;
        }
      }

      if (bird.y + bird.h/2 > canvas.height || bird.y < 0) {
        banPlayer();
        return;
      }
    }

    for (let p of pipes) {
      if (!p.passed && p.x + 40 < bird.x) {
        score++;
        p.passed = true;
      }
    }

    drawPipes();
    drawBird();
    drawScore();

    requestAnimationFrame(gameLoop);
  }

  resetGame();
  gameLoop();
})();
</script>

</body>
</html>
