<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Flappy Birch</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body {
      margin: 0; padding: 0;
      overflow: hidden;
      height: 100%;
      background: #70c5ce;
      font-family: sans-serif;
    }
    canvas {
      display: block;
      position: absolute;
      top: 0; left: 0;
    }
    #score {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 32px;
      color: white;
      text-shadow: 2px 2px #000;
      z-index: 10;
    }
    #console {
      position: absolute;
      bottom: 10px;
      left: 10px;
      background: rgba(0,0,0,0.5);
      color: white;
      padding: 8px;
      font-size: 14px;
      border-radius: 5px;
      z-index: 20;
    }
    #console input {
      background: transparent;
      border: none;
      color: white;
      outline: none;
      width: 180px;
    }
    #console .result {
      margin-top: 4px;
      font-size: 13px;
      color: #00ffcc;
      min-height: 18px;
    }
    #status {
      position: absolute;
      bottom: 10px;
      right: 10px;
      color: white;
      font-size: 14px;
      text-align: right;
      text-shadow: 1px 1px #000;
      z-index: 10;
      min-width: 120px;
    }
    #bannedMessage {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(255,0,0,0.95);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 36px;
      font-weight: bold;
      text-align: center;
      user-select: none;
      z-index: 9999;
      box-shadow: 0 0 30px 10px red;
      display: none;
      flex-direction: column;
    }
    #bannedMessage small {
      font-size: 18px;
      margin-top: 20px;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div id="score">0</div>
  <canvas id="gameCanvas"></canvas>

  <div id="console">
    <div>> <input id="cmdInput" type="text" placeholder="/command..." autocomplete="off" /></div>
    <div class="result" id="cmdResult"></div>
  </div>

  <div id="status">GHOST: OFF<br>SPEED: 1x</div>

  <div id="bannedMessage">
    You have been banned for <span id="banTimer">1:00</span>
    <small>Please wait or refresh page.</small>
  </div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    const FLAP = -8;
    const GRAVITY = 0.5;
    const BIRCH_WIDTH = 34, BIRCH_HEIGHT = 24;
    const PIPE_WIDTH = 60, PIPE_GAP = 180;

    let birch = { x: 80, y: 200, width: BIRCH_WIDTH, height: BIRCH_HEIGHT, velocity: 0 };
    let pipes = [];
    let score = 0;
    let frames = 0;
    let gameOver = false;
    let isGhost = false;
    let speedMultiplier = 1;
    let isPaused = false;

    const scoreDiv = document.getElementById("score");
    const cmdInput = document.getElementById("cmdInput");
    const cmdResult = document.getElementById("cmdResult");
    const statusDiv = document.getElementById("status");
    const bannedMessage = document.getElementById("bannedMessage");
    const banTimerSpan = document.getElementById("banTimer");

    let isBanned = false;
    let bannedUntil = localStorage.getItem("bannedUntil") || 0;

    function startBan(durationMs) {
      isBanned = true;
      bannedUntil = Date.now() + durationMs;
      localStorage.setItem("bannedUntil", bannedUntil);
      bannedMessage.style.display = "flex";
      updateBanTimer();
    }

    function updateBanTimer() {
      const remaining = Math.max(0, bannedUntil - Date.now());
      const seconds = Math.floor((remaining / 1000) % 60);
      const minutes = Math.floor(remaining / 60000);
      banTimerSpan.textContent = `${minutes}:${seconds.toString().padStart(2, "0")}`;
      if (remaining > 0) {
        requestAnimationFrame(updateBanTimer);
      } else {
        isBanned = false;
        bannedMessage.style.display = "none";
        localStorage.removeItem("bannedUntil");
      }
    }

    if (bannedUntil > Date.now()) {
      isBanned = true;
      bannedMessage.style.display = "flex";
      updateBanTimer();
    }

    function flap() {
      if (!gameOver && !isPaused && !isBanned) {
        birch.velocity = FLAP;
      }
    }

    document.addEventListener("keydown", (e) => {
      if (e.code === "Space") flap();
    });

    canvas.addEventListener("mousedown", flap);

    cmdInput.addEventListener("focus", () => {
      isPaused = true;
    });

    cmdInput.addEventListener("blur", () => {
      isPaused = false;
    });

    cmdInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        const input = cmdInput.value.trim();
        cmdInput.value = "";
        cmdResult.textContent = "";
        isPaused = false;

        if (input.startsWith("/ghost")) {
          const arg = input.split(" ")[1];
          if (arg === "on") {
            isGhost = true;
            statusDiv.innerHTML = `GHOST: ON<br>SPEED: ${speedMultiplier}x`;
            startBan(60000);
          } else if (arg === "off") {
            isGhost = false;
            statusDiv.innerHTML = `GHOST: OFF<br>SPEED: ${speedMultiplier}x`;
          }
        } else if (input.startsWith("/speed")) {
          const value = parseInt(input.split(" ")[1]);
          if (!isNaN(value) && value >= 1 && value <= 10) {
            speedMultiplier = value;
            statusDiv.innerHTML = `GHOST: ${isGhost ? "ON" : "OFF"}<br>SPEED: ${speedMultiplier}x`;
            startBan(60000);
          }
        }
      }
    });

    function drawBirch() {
      ctx.fillStyle = "yellow";
      ctx.fillRect(birch.x, birch.y, birch.width, birch.height);
    }

    function drawPipes() {
      ctx.fillStyle = "green";
      for (let pipe of pipes) {
        ctx.fillRect(pipe.x, 0, PIPE_WIDTH, pipe.top);
        ctx.fillRect(pipe.x, pipe.top + PIPE_GAP, PIPE_WIDTH, canvas.height);
      }
    }

    function updateGame() {
      if (isPaused || isBanned) return;

      birch.velocity += GRAVITY;
      birch.y += birch.velocity;

      if (++frames % Math.floor(100 / speedMultiplier) === 0) {
        let top = Math.floor(Math.random() * (canvas.height - PIPE_GAP - 100)) + 50;
        pipes.push({ x: canvas.width, top });
      }

      for (let pipe of pipes) {
        pipe.x -= 2 * speedMultiplier;
      }

      pipes = pipes.filter(p => p.x + PIPE_WIDTH > 0);

      for (let pipe of pipes) {
        if (!isGhost &&
          birch.x < pipe.x + PIPE_WIDTH &&
          birch.x + birch.width > pipe.x &&
          (birch.y < pipe.top || birch.y + birch.height > pipe.top + PIPE_GAP)
        ) {
          gameOver = true;
        }

        if (pipe.x + PIPE_WIDTH === birch.x) {
          score++;
          scoreDiv.textContent = score;
        }
      }

      if (birch.y + birch.height >= canvas.height || birch.y <= 0) {
        gameOver = true;
      }

      if (gameOver) {
        pipes = [];
        birch.y = 200;
        birch.velocity = 0;
        score = 0;
        gameOver = false;
        frames = 0;
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawBirch();
      drawPipes();
    }

    function loop() {
      updateGame();
      draw();
      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
