<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Flappy Birch</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      background: #70c5ce;
      font-family: sans-serif;
    }
    canvas {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
    }
    #score {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 32px;
      color: white;
      text-shadow: 2px 2px #000;
      z-index: 10;
    }
    #console {
      position: absolute;
      bottom: 10px;
      left: 10px;
      background: rgba(0,0,0,0.5);
      color: white;
      padding: 8px;
      font-size: 14px;
      border-radius: 5px;
      z-index: 20;
    }
    #console input {
      background: transparent;
      border: none;
      color: white;
      outline: none;
      width: 180px;
    }
    #console .result {
      margin-top: 4px;
      font-size: 13px;
      color: #00ffcc;
      min-height: 18px;
    }
    #status {
      position: absolute;
      bottom: 10px;
      right: 10px;
      color: white;
      font-size: 14px;
      text-align: right;
      text-shadow: 1px 1px #000;
      z-index: 10;
      min-width: 120px;
    }
    #bannedMessage {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(255,0,0,0.95);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 36px;
      font-weight: bold;
      text-align: center;
      user-select: none;
      z-index: 9999;
      box-shadow: 0 0 30px 10px red;
      display: none;
      padding: 20px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <div id="score">0</div>
  <canvas id="gameCanvas"></canvas>

  <div id="console">
    <div>> <input id="cmdInput" type="text" placeholder="/command..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" /></div>
    <div class="result" id="cmdResult"></div>
  </div>

  <div id="status">
    GHOST: OFF<br>
    SPEED: 1x
  </div>

  <div id="bannedMessage">You have been banned for 1:00</div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    const GRAVITY = 0.5;
    const FLAP = -8;
    const PIPE_WIDTH = 60;
    const PIPE_GAP = 180;
    const BIRCH_WIDTH = 34;
    const BIRCH_HEIGHT = 24;

    let birch = {
      x: 80,
      y: 200,
      width: BIRCH_WIDTH,
      height: BIRCH_HEIGHT,
      velocity: 0
    };

    let pipes = [];
    let score = 0;
    let gameOver = false;
    let frames = 0;

    let isGhost = false;
    let speedMultiplier = 1;
    let isPaused = false;

    let isBanned = false;
    let bannedExpireTime = 0;

    let birchImage = new Image();
    birchImage.src = "birch.png";
    birchImage.onerror = () => { birchImage = null; };

    const scoreDiv = document.getElementById("score");
    const cmdInput = document.getElementById("cmdInput");
    const cmdResult = document.getElementById("cmdResult");
    const statusDiv = document.getElementById("status");
    const bannedMessage = document.getElementById("bannedMessage");
    const metaViewport = document.querySelector('meta[name=viewport]');

    function updateStatus() {
      statusDiv.innerHTML =
        `GHOST: ${isGhost ? 'ON' : 'OFF'}<br>` +
        `SPEED: ${speedMultiplier}x`;
    }

    function resetGame() {
      birch.y = canvas.height / 2;
      birch.velocity = 0;
      pipes = [];
      score = 0;
      gameOver = false;
      scoreDiv.textContent = "0";
      frames = 0;
      checkBanStatus();
    }

    function spawnPipe() {
      const topHeight = Math.floor(Math.random() * (canvas.height - PIPE_GAP - 100)) + 50;
      const bottomY = topHeight + PIPE_GAP;
      pipes.push({
        x: canvas.width,
        top: topHeight,
        bottom: canvas.height - bottomY
      });
    }

    function drawBirch() {
      if (birchImage && birchImage.complete) {
        ctx.drawImage(birchImage, birch.x, birch.y, birch.width, birch.height);
      } else {
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(birch.x, birch.y, birch.width, birch.height);
      }
    }

    function drawPipes() {
      ctx.fillStyle = "#228B22";
      pipes.forEach(pipe => {
        ctx.fillRect(pipe.x, 0, PIPE_WIDTH, pipe.top);
        ctx.fillRect(pipe.x, canvas.height - pipe.bottom, PIPE_WIDTH, pipe.bottom);
      });
    }

    function update() {
      if (gameOver || isPaused || isBanned) return;

      birch.velocity += GRAVITY;
      birch.y += birch.velocity;

      if (frames % Math.floor(90 / speedMultiplier) === 0) {
        spawnPipe();
      }

      pipes.forEach(pipe => pipe.x -= 2 * speedMultiplier);

      if (pipes.length && pipes[0].x + PIPE_WIDTH < 0) {
        pipes.shift();
        score++;
        scoreDiv.textContent = score;
      }

      pipes.forEach(pipe => {
        const collide =
          birch.x < pipe.x + PIPE_WIDTH &&
          birch.x + birch.width > pipe.x &&
          (
            birch.y < pipe.top ||
            birch.y + birch.height > canvas.height - pipe.bottom
          );
        if (collide && !isGhost) {
          gameOver = true;
        }
      });

      if ((birch.y + birch.height > canvas.height || birch.y < 0) && !isGhost) {
        gameOver = true;
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawBirch();
      drawPipes();

      if (gameOver) {
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#fff";
        ctx.font = "40px sans-serif";
        ctx.fillText("Game Over", canvas.width / 2 - 100, canvas.height / 2);
        ctx.font = "20px sans-serif";
        ctx.fillText("Click to restart", canvas.width / 2 - 80, canvas.height / 2 + 30);
      }
    }

    function loop() {
      update();
      draw();
      updateBanTimer();
      frames++;
      requestAnimationFrame(loop);
    }

    function showBannedMessage() {
      bannedMessage.style.display = "flex";
    }
    function hideBannedMessage() {
      bannedMessage.style.display = "none";
    }

    function checkBanStatus() {
      if (isBanned) {
        const now = Date.now();
        if (now >= bannedExpireTime) {
          isBanned = false;
          hideBannedMessage();
          isPaused = false;
        } else {
          showBannedMessage();
          isPaused = true;
        }
      } else {
        hideBannedMessage();
        isPaused = false;
      }
    }

    function updateBanTimer() {
      if (!isBanned) return;
      const now = Date.now();
      let diff = Math.floor((bannedExpireTime - now) / 1000);
      if (diff < 0) {
        isBanned = false;
        hideBannedMessage();
        isPaused = false;
        return;
      }
      const minutes = Math.floor(diff / 60);
      const seconds = diff % 60;
      bannedMessage.textContent = `You have been banned for ${minutes}:${seconds.toString().padStart(2,'0')}`;
    }

    canvas.addEventListener("mousedown", () => {
      if (gameOver && !isBanned) {
        resetGame();
      } else if (!isPaused && !isBanned) {
        birch.velocity = FLAP;
      }
    });

    function parseCommand(input) {
      const args = input.trim().toLowerCase().split(" ");
      const cmd = args[0];
      const val = args[1];

      let accepted = false;

      if (cmd === "/ghost") {
        if (val === "on") {
          isGhost = true;
          cmdResult.textContent = "GHOST MODE: ON";
          accepted = true;
        } else if (val === "off") {
          isGhost = false;
          cmdResult.textContent = "GHOST MODE: OFF";
          accepted = true;
        } else {
          cmdResult.textContent = "Usage: /ghost on|off";
        }
      } else if (cmd === "/speed") {
        const speed = parseInt(val);
        if (!isNaN(speed) && speed >= 1 && speed <= 10) {
          speedMultiplier = speed;
          cmdResult.textContent = `SPEED set to ${speed}x`;
          accepted = true;
        } else {
          cmdResult.textContent = "Usage: /speed <1–10>";
        }
      } else if (cmd === "/banned") {
        isBanned = true;
        bannedExpireTime = Date.now() + 60000;
        cmdResult.textContent = "";
        accepted = true;
        checkBanStatus();
      } else {
        cmdResult.textContent = "Unknown command.";
      }

      updateStatus();

      if (accepted) {
        cmdInput.blur();
        isPaused = false;
      }
    }

    cmdInput.addEventListener("focus", () => {
      isPaused = true;
      metaViewport.setAttribute("content", "width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no");
    });

    cmdInput.addEventListener("blur", () => {
      metaViewport.setAttribute("content", "width=device-width, initial-scale=1");
      isPaused = false;
    });

    cmdInput.addEventListener("keydown", e => {
      if (e.key === "Enter") {
        const val = cmdInput.value.trim();
        if (val.startsWith("/")) {
          parseCommand(val);
        }
        cmdInput.value = "";
      }
    });

    updateStatus();
    checkBanStatus();
    loop();
  </script>
</body>
</html>
