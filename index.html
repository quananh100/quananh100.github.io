<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Flappy Birch with Antiban</title>
<style>
  html, body {
    margin:0; padding:0; overflow:hidden; height:100%;
    background:#70c5ce;
    font-family: sans-serif;
  }
  #gameCanvas {
    display: block;
    margin: 0 auto;
    background: #70c5ce;
    width: 100vw;
    height: 100vh;
  }
  #commandInput {
    position: fixed;
    bottom: 10px; left: 50%;
    transform: translateX(-50%);
    width: 80vw;
    max-width: 400px;
    padding: 10px;
    font-size: 18px;
    border-radius: 6px;
    border: none;
    outline: none;
    box-shadow: 0 0 10px #3336 inset;
    background: rgba(255 255 255 / 0.9);
  }
  #bannedOverlay {
    position: fixed;
    top:0; left:0; right:0; bottom:0;
    background: rgba(0,0,0,0.85);
    color: #fff;
    font-size: 30px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    text-align: center;
    padding: 20px;
    display: none;
  }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>
<input id="commandInput" placeholder="Enter command, e.g. /ghost on" autocomplete="off" />

<div id="bannedOverlay">
  <div>You have been banned!</div>
  <div id="banCountdown" style="margin-top:15px; font-size:48px; font-weight:bold;"></div>
</div>

<script>
(() => {
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const input = document.getElementById('commandInput');
  const bannedOverlay = document.getElementById('bannedOverlay');
  const banCountdown = document.getElementById('banCountdown');

  // Resize canvas full screen
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  // Game variables
  let bird = { x: 50, y: 150, width: 34, height: 24, velocity: 0, gravity: 0.6, lift: -12 };
  let pipes = [];
  let frame = 0;
  let score = 0;
  let gameOver = false;
  let bannedUntil = localStorage.getItem('bannedUntil') ? parseInt(localStorage.getItem('bannedUntil')) : 0;
  let antiban = localStorage.getItem('antiban') === 'true';
  let ghost = false;
  let speed = 1;
  let inputActive = false;

  // Handle banned overlay
  function showBanOverlay() {
    bannedOverlay.style.display = 'flex';
  }
  function hideBanOverlay() {
    bannedOverlay.style.display = 'none';
  }

  // Countdown timer for ban
  let banTimerInterval = null;
  function startBanTimer() {
    if (banTimerInterval) clearInterval(banTimerInterval);
    banTimerInterval = setInterval(() => {
      const now = Date.now();
      if (now >= bannedUntil) {
        bannedUntil = 0;
        localStorage.removeItem('bannedUntil');
        hideBanOverlay();
        clearInterval(banTimerInterval);
        gameOver = false;
        resetGame();
      } else {
        let diff = bannedUntil - now;
        let min = Math.floor(diff / 60000);
        let sec = Math.floor((diff % 60000) / 1000);
        banCountdown.textContent = `${min.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
      }
    }, 250);
  }

  // Ban player for 1 minute
  function banPlayer() {
    if (antiban) return; // Do not ban if antiban on
    const now = Date.now();
    bannedUntil = now + 60000;
    localStorage.setItem('bannedUntil', bannedUntil);
    showBanOverlay();
    startBanTimer();
    gameOver = true;
  }

  // Reset game
  function resetGame() {
    bird.y = 150;
    bird.velocity = 0;
    pipes = [];
    frame = 0;
    score = 0;
    gameOver = false;
    hideBanOverlay();
  }

  // Add pipes
  function addPipe() {
    const gap = 120;
    const pipeTopHeight = Math.random() * (canvas.height / 2);
    pipes.push({ x: canvas.width, top: pipeTopHeight, bottom: pipeTopHeight + gap });
  }

  // Draw functions
  function drawBird() {
    ctx.fillStyle = ghost ? 'rgba(255,255,255,0.5)' : '#FF0';
    ctx.beginPath();
    ctx.ellipse(bird.x, bird.y, bird.width/2, bird.height/2, 0, 0, 2 * Math.PI);
    ctx.fill();
  }
  function drawPipes() {
    ctx.fillStyle = '#0A0';
    pipes.forEach(pipe => {
      ctx.fillRect(pipe.x, 0, 40, pipe.top);
      ctx.fillRect(pipe.x, pipe.bottom, 40, canvas.height - pipe.bottom);
    });
  }
  function drawScore() {
    ctx.fillStyle = '#FFF';
    ctx.font = '30px sans-serif';
    ctx.fillText(`Score: ${score}`, 10, 40);
  }

  // Game loop
  function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (gameOver) {
      ctx.fillStyle = '#FFF';
      ctx.font = '40px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Game Over', canvas.width/2, canvas.height/2);
      return;
    }
    frame++;
    if (frame % 90 === 0) addPipe();

    // Bird physics
    bird.velocity += bird.gravity * speed;
    bird.y += bird.velocity;

    // Pipes movement
    pipes.forEach(pipe => {
      pipe.x -= 3 * speed;
    });
    pipes = pipes.filter(pipe => pipe.x + 40 > 0);

    // Check collision with pipes (unless ghost)
    if (!ghost) {
      for (let pipe of pipes) {
        if (
          bird.x + bird.width/2 > pipe.x &&
          bird.x - bird.width/2 < pipe.x + 40 &&
          (bird.y - bird.height/2 < pipe.top || bird.y + bird.height/2 > pipe.bottom)
        ) {
          banPlayer();
        }
      }
    }

    // Check collision with ground or ceiling
    if (!ghost && (bird.y + bird.height/2 > canvas.height || bird.y - bird.height/2 < 0)) {
      banPlayer();
    }

    // Score counting
    pipes.forEach(pipe => {
      if (!pipe.passed && pipe.x + 40 < bird.x) {
        score++;
        pipe.passed = true;
      }
    });

    drawPipes();
    drawBird();
    drawScore();

    if (!gameOver) requestAnimationFrame(gameLoop);
  }

  // Command input handling
  input.addEventListener('focus', () => {
    inputActive = true;
    // Pause game when typing command
  });
  input.addEventListener('blur', () => {
    inputActive = false;
    // Resume game when done typing
    if (!gameOver) gameLoop();
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const cmd = input.value.trim().toLowerCase();
      input.value = '';
      if (!cmd.startsWith('/')) return;
      input.blur();

      if (cmd === '/ghost on') {
        ghost = true;
        alert('Ghost mode ON');
      } else if (cmd === '/ghost off') {
        ghost = false;
        alert('Ghost mode OFF');
      } else if (cmd.startsWith('/speed ')) {
        let val = parseInt(cmd.split(' ')[1]);
        if (isNaN(val) || val < 1) val = 1;
        if (val > 10) val = 10;
        speed = val;
        alert('Speed set to ' + speed);
      } else if (cmd === '/antiban on') {
        antiban = true;
        localStorage.setItem('antiban', 'true');
        alert('Anti-Ban ENABLED');
      } else if (cmd === '/antiban off') {
        antiban = false;
        localStorage.removeItem('antiban');
        alert('Anti-Ban DISABLED');
      } else {
        alert('Unknown command');
      }
    }
  });

  // On load
  if (bannedUntil > Date.now()) {
    showBanOverlay();
    startBanTimer();
  } else {
    hideBanOverlay();
    resetGame();
    gameLoop();
  }
  antiban = localStorage.getItem('antiban') === 'true';

  // Expose antiban toggle to bookmarklet
  window.enableAntiBan = () => {
    antiban = true;
    localStorage.setItem('antiban', 'true');
    alert('Anti-Ban ENABLED');
  };
  window.disableAntiBan = () => {
    antiban = false;
    localStorage.removeItem('antiban');
    alert('Anti-Ban DISABLED');
  };

})();
</script>

</body>
</html>
